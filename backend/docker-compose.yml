version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ads_user
      POSTGRES_PASSWORD: ads_password
      POSTGRES_DB: ads_db
    ports:
      - '5432:5432'
    volumes:
      - ads_db_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'

  backend:
    build: .
    ports:
      - '5001:5001'
    environment:
      DATABASE_URL: postgresql://ads_user:ads_password@db:5432/ads_db?schema=public
      PORT: 5001
      JWT_SECRET: super_secret_jwt_key_change_me
    depends_on:
      - db

volumes:
  ads_db_data:
